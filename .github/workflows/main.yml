name: Build Leonify APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            ccache
          sudo apt-get install -y libtinfo5 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.36 Pillow

      - name: Cache Buildozer global state
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.cache/pip
          key: buildozer-global-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-${{ runner.os }}-

      - name: Cache Buildozer local state
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      - name: Generate icon & presplash
        run: python generate_assets.py

      - name: Build APK (debug)
        run: |
          yes | buildozer -v android debug

      - name: List built artifacts
        run: |
          echo "=== bin directory ==="
          ls -la bin/ || echo "no bin dir"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: leonify-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/build-*/dists/*/build.log
            .buildozer/android/platform/python-for-android/*.log
          retention-days: 7
